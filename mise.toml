[settings]
experimental = true

[tools]
actionlint = "1.7.12"
betterleaks = "1.4.1"
gh = "2.93.0"
ghalint = "1.5.6"
lefthook = "2.1.9"
yamlfmt = "0.21.0"
yq = "4.53.2"
zizmor = "1.25.2"

[hooks]
postinstall = "if [ -z \"${CI:-}\" ] && git rev-parse --git-dir > /dev/null 2>&1; then lefthook install; fi"

[tasks."skills:validate"]
run = "scripts/validate-skills.sh"
description = "Validate all SKILL.md files"

[tasks."skills:validate:one"]
run = "scripts/validate-skills.sh {{arg(name='path')}}"
description = "Validate a single SKILL.md (e.g. mise run skills:validate:one path/to/SKILL.md)"
